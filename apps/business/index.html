/* =========================================================
   GALAXY CUE TITAN DESIGN SYSTEM — v1.4
   Titanium + Champagne Gold
   ========================================================= */
:root{
  --gc-bg:#0b0c0f;
  --gc-bg-deep:#07080a;
  --gc-panel:#15171b;
  --gc-panel-2:#1a1c21;
  --gc-border:#2a2d33;
  --gc-border-soft:rgba(255,255,255,.075);
  --gc-titanium:#bfc3c9;
  --gc-titanium-bright:#e4e7eb;
  --gc-gold:#c8a96a;
  --gc-gold-bright:#dfc184;
  --gc-gold-dark:#8f7442;
  --gc-text:#f5f5f7;
  --gc-muted:#9a9ea6;
}

body,.crm-shell{
  background:
    radial-gradient(circle at 73% -14%,rgba(200,169,106,.10),transparent 34%),
    radial-gradient(circle at 8% 110%,rgba(191,195,201,.06),transparent 31%),
    var(--gc-bg)!important;
  color:var(--gc-text)!important;
}

.crm-topbar{
  background:rgba(8,9,11,.92)!important;
  border-bottom:1px solid var(--gc-border)!important;
  box-shadow:0 12px 40px rgba(0,0,0,.24);
}

.galaxy-cue-logo{
  filter:drop-shadow(0 8px 22px rgba(200,169,106,.10));
}

.crm-sidebar{
  background:linear-gradient(180deg,rgba(12,13,16,.96),rgba(7,8,10,.96))!important;
  border-right:1px solid var(--gc-border)!important;
}

.crm-nav:hover,.crm-nav.active,.workflow-nav:hover,.workflow-nav.active{
  background:linear-gradient(145deg,rgba(200,169,106,.13),rgba(191,195,201,.045))!important;
  color:var(--gc-text)!important;
  box-shadow:inset 3px 0 0 var(--gc-gold);
}

.eyebrow,.preview-eyebrow{
  color:var(--gc-gold)!important;
}

.btn.primary{
  color:#111214!important;
  border-color:var(--gc-gold-bright)!important;
  background:linear-gradient(145deg,var(--gc-gold-bright),var(--gc-gold))!important;
  box-shadow:0 10px 28px rgba(200,169,106,.16);
}
.btn.primary:hover{
  transform:translateY(-1px);
  filter:brightness(1.05);
  box-shadow:0 14px 34px rgba(200,169,106,.22);
}
.btn,.command-trigger,.status-pill,.cloud-status{
  border-color:var(--gc-border)!important;
  background:linear-gradient(145deg,#17191e,#101216)!important;
  color:var(--gc-titanium-bright)!important;
}

.kpi-card,.lux-card,.booking-list-panel,.booking-preview-panel,
.calendar-card,.calendar-agenda,.booking-table-card,.form-card,.module-card{
  background:linear-gradient(145deg,var(--gc-panel-2),var(--gc-panel))!important;
  border-color:var(--gc-border)!important;
  box-shadow:0 20px 50px rgba(0,0,0,.18);
}

.kpi-card:after{
  background:rgba(200,169,106,.08)!important;
}
.kpi-icon,.text-button,.next-date,.preview-date,.calendar-day-head em,
.more-events,.agenda-date span{
  color:var(--gc-gold)!important;
}

.booking-card.selected{
  background:linear-gradient(145deg,rgba(200,169,106,.11),rgba(191,195,201,.035))!important;
  border-color:rgba(200,169,106,.55)!important;
  box-shadow:inset 3px 0 0 var(--gc-gold)!important;
}

.mini-progress span,.progress span{
  background:linear-gradient(90deg,var(--gc-titanium),var(--gc-gold-bright))!important;
}

.calendar-cell.today{
  background:linear-gradient(145deg,rgba(200,169,106,.12),rgba(16,18,22,.9))!important;
  box-shadow:inset 0 0 0 1px rgba(200,169,106,.55)!important;
}
.calendar-cell.today .calendar-day-head>span{
  background:var(--gc-gold)!important;
  color:#101114!important;
}
.calendar-event.wedding{border-left-color:var(--gc-gold)!important}
.calendar-event.corporate{border-left-color:var(--gc-titanium)!important}
.calendar-event.private{border-left-color:#8f93a0!important}

.status-chip.gold{
  color:var(--gc-gold-bright)!important;
  border-color:rgba(200,169,106,.45)!important;
  background:rgba(200,169,106,.08)!important;
}

.search-box,.crm-sort,input,textarea,select{
  background:#111318!important;
  border-color:var(--gc-border)!important;
  color:var(--gc-text)!important;
}
.search-box:focus-within,input:focus,textarea:focus,select:focus{
  border-color:rgba(200,169,106,.68)!important;
  box-shadow:0 0 0 3px rgba(200,169,106,.08)!important;
}

.gc-mark{
  background:linear-gradient(145deg,var(--gc-titanium),var(--gc-gold))!important;
  color:#111214!important;
}

.footer-note{
  color:var(--gc-muted)!important;
}

::selection{
  background:rgba(200,169,106,.28);
  color:#fff;
}

/* Galaxy Cue Titan v1.5 — navigation, slogan and module shell */
.galaxy-cue-brand{gap:18px}
.galaxy-cue-logo{width:min(310px,26vw)!important;max-height:67px!important}
.brand-divider{width:1px;height:58px;background:linear-gradient(180deg,transparent,var(--gc-gold),transparent);flex:0 0 1px}
.brand-tagline{color:#c0c2c7;font-size:12px;line-height:1.55;letter-spacing:.01em;white-space:nowrap}

.crm-nav{margin-bottom:4px}

.section-placeholder .placeholder-icon{width:72px;height:72px;border:1px solid rgba(200,169,106,.45);border-radius:21px;display:grid;place-items:center;font-size:30px;color:var(--gc-gold);background:rgba(200,169,106,.06);margin-bottom:20px}
.section-placeholder h2{font-size:25px;margin:0 0 10px}
.section-placeholder p{max-width:600px;color:var(--gc-muted);line-height:1.6;margin:0 0 22px}
.gc-login-card{text-align:center;max-width:430px}
.login-mark{width:86px;height:86px;border-radius:24px;margin:0 auto 18px;display:block;box-shadow:0 22px 55px rgba(200,169,106,.16)}
.gc-login-card input{text-align:left}
.calendar-toolbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin-bottom:15px}
.calendar-toolbar h2{margin:0;text-align:center}
.calendar-count{text-align:right;color:var(--gc-muted);font-size:12px}
.calendar-nav-buttons{display:flex;gap:8px}
.calendar-card{overflow:hidden}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--gc-border)}
.calendar-weekdays span{text-align:center;padding:12px 5px;color:#767b84;text-transform:uppercase;letter-spacing:.12em;font-size:9px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.calendar-cell{min-height:128px;padding:9px;border-right:1px solid var(--gc-border-soft);border-bottom:1px solid var(--gc-border-soft);background:rgba(13,14,17,.65)}
.calendar-cell:nth-child(7n){border-right:0}
.calendar-cell.outside{background:#090a0c}
.calendar-day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.calendar-day-head>span{display:grid;place-items:center;width:27px;height:27px;border-radius:9px;font-size:12px;color:#bbbfc6}
.calendar-day-head em{font-style:normal;font-size:8px;text-transform:uppercase;letter-spacing:.08em}
.calendar-events{display:grid;gap:5px}
.calendar-event{width:100%;border:1px solid rgba(200,169,106,.28);border-left:3px solid var(--gc-gold);background:#191a1e;color:#fff;text-align:left;border-radius:8px;padding:6px 7px;cursor:pointer;overflow:hidden}
.calendar-event strong,.calendar-event span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calendar-event strong{font-size:10px}.calendar-event span{font-size:8px;color:#999da5;margin-top:2px}
@media(max-width:1050px){
  .brand-tagline,.brand-divider{display:none}

}

  .calendar-toolbar{grid-template-columns:1fr auto}.calendar-toolbar h2{grid-column:1/-1;grid-row:1;text-align:left}.calendar-card{overflow-x:auto}.calendar-weekdays,.calendar-grid{min-width:760px}

/* Galaxy Cue v5.0.0-alpha.23 — site-wide typography + sidebar scroll repair
   Every primary page title now follows the same CRM title treatment.
   The navigation column has its own reliable viewport scroll area. */
:root{
  --gc-ui-font:'Nunito Sans',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --gc-page-title-size:44px;
  --gc-page-title-weight:800;
  --gc-page-title-line-height:1;
}

/* One UI font throughout the application. The logo/brand lockups remain exempt. */
html,body,#app,.crm-shell,.crm-layout,.crm-main,
.crm-sidebar,.crm-sidebar button,
.workspace-module,#module,#module *,
.dash-hero,.workspace-hero,
.card,.card *,
button,input,select,textarea,option,label{
  font-family:var(--gc-ui-font);
}

/* Page titles: Dashboard, Events, Clients, Calendar, Music Planner, Files,
   Messages and all current/future workspaces use the same face and scale. */
.dash-hero h1,
.workspace-hero h1,
.crm-main > .hero h1,
.crm-main > section.hero h1{
  font-family:var(--gc-ui-font)!important;
  font-size:var(--gc-page-title-size)!important;
  font-weight:var(--gc-page-title-weight)!important;
  line-height:var(--gc-page-title-line-height)!important;
  letter-spacing:-.045em!important;
  margin:6px 0 7px!important;
}

/* Keep the intentionally branded logo/fallback typography unchanged. */
.brand-fallback strong,
.login-brand-lockup strong{
  font-family:Sansita,var(--gc-ui-font)!important;
}

/* Native controls must not introduce browser-specific fonts. */
button,input,select,textarea,option,optgroup{
  font:inherit;
}

/* Desktop navigation gets an independent, full-height scroll area. */
.crm-sidebar{
  min-height:0!important;
  height:calc(100dvh - 92px)!important;
  overflow-y:auto!important;
  overflow-x:hidden!important;
  overscroll-behavior:contain;
  scrollbar-gutter:stable;
  -webkit-overflow-scrolling:touch;
  padding-bottom:max(42px,env(safe-area-inset-bottom))!important;
}

.crm-sidebar .sidebar-footer{
  flex:0 0 auto;
  margin-top:18px;
  margin-bottom:8px;
}

/* Ensure the booking-workspace list does not trap or clip sidebar scrolling. */
.crm-sidebar .workflow-scroll{
  flex:0 0 auto;
  overflow:visible!important;
  max-height:none!important;
}

@media(max-width:760px){
  :root{--gc-page-title-size:clamp(34px,11vw,46px)}
  .crm-sidebar{
    top:0!important;
    bottom:0!important;
    height:100dvh!important;
    max-height:100dvh!important;
    overflow-y:auto!important;
    overflow-x:hidden!important;
    padding-bottom:max(34px,calc(18px + env(safe-area-inset-bottom)))!important;
  }
}
